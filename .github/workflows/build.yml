name: Build OpenWrt Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_NAME: luci-app-taoistfuchen

  # GitHub Actions Node.js 20 deprecation compatibility.
  # Force JavaScript actions to run with Node.js 24 now.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build OpenWrt ${{ matrix.openwrt_version }} ${{ matrix.target }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # The package is scoped to OpenWrt 25.12.5 and bundles verified
          # aarch64_cortex-a53 release binaries.
          - openwrt_version: "25.12.5"
            target: "mediatek/mt7622"
            target_name: "mediatek-mt7622"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Files uploaded through GitHub's web interface are recorded as 0644,
      # even when they are executable in the source archive. Restore the
      # runtime modes before running tests or copying the package into the SDK.
      - name: Normalize executable permissions
        run: |
          set -eux

          chmod 0755 \
            tests/*.sh \
            luci-app-taoistfuchen/root/etc/init.d/* \
            luci-app-taoistfuchen/root/etc/hotplug.d/iface/99-taoistfuchen \
            luci-app-taoistfuchen/root/etc/uci-defaults/99_taoistfuchen \
            luci-app-taoistfuchen/root/usr/bin/fakehttp \
            luci-app-taoistfuchen/root/usr/bin/fakesip \
            luci-app-taoistfuchen/root/www/cgi-bin/taoistfuchen-upload

      - name: Verify source provenance and regression policy
        run: |
          set -eux

          sha256sum -c third_party/SHA256SUMS
          # The upload CGI intentionally accepts only root-owned private
          # directories. OpenWrt runs it as root, so exercise the regression
          # suite under the same privilege model instead of weakening that
          # production security check for GitHub's unprivileged runner user.
          sudo -E ./tests/run.sh

      - name: Install build dependencies
        run: |
          set -eux

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget \
            xz-utils \
            zstd

      - name: Download and verify OpenWrt SDK
        run: |
          set -eux

          OPENWRT_VERSION="${{ matrix.openwrt_version }}"
          TARGET="${{ matrix.target }}"
          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}"

          echo "OpenWrt version: ${OPENWRT_VERSION}"
          echo "Target: ${TARGET}"
          echo "SDK base URL: ${BASE_URL}"

          wget -q "${BASE_URL}/sha256sums" -O sha256sums

          SDK_FILE="$(awk '/openwrt-sdk/ { gsub(/^\*/, "", $2); print $2; exit }' sha256sums)"

          if [ -z "${SDK_FILE}" ]; then
            echo "OpenWrt SDK file was not found in sha256sums"
            exit 1
          fi

          echo "Matched SDK file: ${SDK_FILE}"

          wget -q "${BASE_URL}/${SDK_FILE}" -O "${SDK_FILE}"

          awk -v f="${SDK_FILE}" '
            $2 == f || $2 == "*" f {
              print
              found=1
            }
            END {
              exit found ? 0 : 1
            }
          ' sha256sums > sha256sums.sdk

          sha256sum -c sha256sums.sdk

          SDK_DIR="$(tar -tf "${SDK_FILE}" | head -n 1 | cut -d/ -f1)"

          if [ -z "${SDK_DIR}" ]; then
            echo "Unable to detect SDK directory name"
            exit 1
          fi

          tar -xf "${SDK_FILE}"
          mv "${SDK_DIR}" openwrt-sdk

      - name: Cache OpenWrt downloads
        uses: actions/cache@v5
        with:
          path: openwrt-sdk/dl
          key: openwrt-dl-${{ runner.os }}-${{ matrix.openwrt_version }}-${{ matrix.target_name }}-${{ hashFiles('luci-app-taoistfuchen/**') }}
          restore-keys: |
            openwrt-dl-${{ runner.os }}-${{ matrix.openwrt_version }}-${{ matrix.target_name }}-
            openwrt-dl-${{ runner.os }}-${{ matrix.openwrt_version }}-

      - name: Copy package source into SDK
        run: |
          set -eux

          cp -a luci-app-taoistfuchen openwrt-sdk/package/

      - name: Update and install feeds
        working-directory: openwrt-sdk
        run: |
          set -eux

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile package
        working-directory: openwrt-sdk
        run: |
          set -eux

          # The release SDK declares every prebuilt package as a hidden y/m
          # default in Config-build.in. If left unchanged, depending on one
          # kernel module causes the SDK to package hundreds of unrelated
          # modules and firmware files. Neutralize only those SDK defaults;
          # Kconfig will re-enable the package and its real dependencies.
          awk '
            /^config[[:space:]]+PACKAGE_/ {
              in_package = 1
            }
            /^config[[:space:]]+/ &&
                $0 !~ /^config[[:space:]]+PACKAGE_/ {
              in_package = 0
            }
            in_package &&
                /^[[:space:]]*default[[:space:]]+[my][[:space:]]*$/ {
              sub(/default[[:space:]]+[my]/, "default n")
            }
            { print }
          ' Config-build.in > Config-build.in.new
          mv Config-build.in.new Config-build.in

          printf '%s\n' \
            '# CONFIG_ALL is not set' \
            '# CONFIG_ALL_KMODS is not set' \
            '# CONFIG_ALL_NONSHARED is not set' \
            "CONFIG_PACKAGE_${PACKAGE_NAME}=m" > .config

          make defconfig

          for symbol in ALL ALL_KMODS ALL_NONSHARED; do
            grep -Fqx "# CONFIG_${symbol} is not set" .config
          done
          grep -Fqx "CONFIG_PACKAGE_${PACKAGE_NAME}=m" .config

          # For the pinned 25.12.5 mediatek/mt7622 SDK this is the complete
          # module set: this package, nftables-nojson, kmod-nft-queue and the
          # three coreutils packages. Only nft-core is selected as a built-in
          # kernel package, and no firmware package is required.
          test "$(grep -c '^CONFIG_PACKAGE_.*=m$' .config)" -eq 6
          test "$(grep -c '^CONFIG_PACKAGE_kmod-.*=m$' .config)" -eq 1
          test "$(grep -c '^CONFIG_PACKAGE_kmod-.*=y$' .config)" -eq 1

          if grep -E '^CONFIG_PACKAGE_.*firmware.*=[my]$' .config; then
            echo "Unexpected firmware package selected"
            exit 1
          fi

          make package/${PACKAGE_NAME}/compile V=s -j"$(nproc)"

      - name: Prepare artifact
        run: |
          set -eux

          mkdir -p output_pkg

          # Keep the licenses, corresponding GPL source and provenance in the
          # same downloadable artifact as the binary package.
          cp THIRD_PARTY_SOURCES.md luci-app-taoistfuchen/COPYING \
            luci-app-taoistfuchen/LICENSE output_pkg/
          cp third_party/sources/*.tar.gz output_pkg/

          find openwrt-sdk/bin/packages/ -type f \( \
            -name "${PACKAGE_NAME}*.ipk" -o \
            -name "${PACKAGE_NAME}*.apk" \
          \) -exec cp {} output_pkg/ \;

          if ! find output_pkg -type f \( -name "*.ipk" -o -name "*.apk" \) | grep -q .; then
            echo "No package was built"
            exit 1
          fi

          (
            cd output_pkg
            sha256sum COPYING LICENSE THIRD_PARTY_SOURCES.md *.tar.gz *.*pk > SHA256SUMS
          )

          echo "Generated packages:"
          find output_pkg -type f -maxdepth 1 -print

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: luci-app-taoistfuchen-${{ matrix.openwrt_version }}-${{ matrix.target_name }}
          path: output_pkg/*
          if-no-files-found: error
